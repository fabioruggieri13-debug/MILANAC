<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC V31</title>
    <style>
        :root { --red: #C61C23; --bg: #000; --card: #111; --gold: #D4AF37; --pitch: #1b3d21; }
        
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Inter', sans-serif; height: 100%; overflow: hidden; }

        /* INTRO ORIGINALE - PULSANTE */
        #intro { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .logo-title { font-size: 3.5rem; font-weight: 900; color: var(--red); letter-spacing: -2px; margin-bottom: 40px; }
        .btn-pulse { 
            background: var(--red); color: white; border: none; padding: 22px 45px; font-size: 1rem; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase;
            animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(198, 28, 35, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(198, 28, 35, 0); } 100% { box-shadow: 0 0 0 0 rgba(198, 28, 35, 0); } }

        /* NAV */
        header { height: 60px; background: #0a0a0a; border-bottom: 2px solid var(--red); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .burger { font-size: 28px; color: var(--red); cursor: pointer; }
        .menu { position: absolute; top: 60px; right: 0; background: #080808; width: 220px; display: none; flex-direction: column; border: 1px solid var(--red); z-index: 999; }
        .menu button { background: none; border: none; color: white; padding: 18px; text-align: left; border-bottom: 1px solid #1a1a1a; font-weight: bold; text-transform: uppercase; font-size: 13px; }

        .content { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; } .active { display: block; }

        /* IL CAMPO PROFESSIONALE */
        #pitch { 
            width: 100%; height: 460px; background: var(--pitch); border: 2px solid rgba(255,255,255,0.8); border-radius: 4px; position: relative; overflow: hidden; touch-action: none; 
            background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 100% 40px;
        }
        .pitch-line { position: absolute; border: 1.5px solid rgba(255,255,255,0.8); }
        .mid-line { top: 50%; width: 100%; height: 0; border-top: 1.5px solid rgba(255,255,255,0.8); }
        .center-circle { top: 50%; left: 50%; width: 90px; height: 90px; border-radius: 50%; transform: translate(-50%, -50%); }
        .penalty-area { left: 50%; width: 50%; height: 60px; transform: translateX(-50%); }
        .penalty-area.top { top: -2px; border-top: none; }
        .penalty-area.bot { bottom: -2px; border-bottom: none; }

        /* UI CARDS */
        .card { background: var(--card); border: 1px solid #222; border-radius: 4px; padding: 15px; margin-bottom: 12px; border-left: 3px solid var(--red); }
        .tag-player { position: absolute; background: #000; color: #fff; padding: 6px 12px; border-radius: 2px; font-size: 11px; font-weight: 900; border-left: 3px solid var(--red); z-index: 100; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .btn-main { background: var(--red); color: white; border: none; padding: 16px; border-radius: 4px; width: 100%; font-weight: 900; text-transform: uppercase; font-size: 14px; cursor: pointer; }
        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 10px; border-radius: 4px; font-family: inherit; }
        .voto { color: var(--gold); font-weight: 900; font-size: 14px; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="logo-title">MILANAC</div>
        <button class="btn-pulse" onclick="start()">MILANAC la web app dei giocatori</button>
    </div>

    <header>
        <div style="color: var(--red); font-weight: 900; font-size: 1.2rem; letter-spacing: 2px;">MILANAC</div>
        <div class="burger" onclick="toggleM()">☰</div>
        <div id="menu" class="menu">
            <button onclick="vai('h')">SQUADRA</button>
            <button onclick="vai('t')">LAVAGNA TATTICA</button>
            <button onclick="vai('n')">NOTIZIE</button>
            <button onclick="vai('s')">STATISTICHE</button>
            <button onclick="vai('a')">ADMIN</button>
        </div>
    </header>

    <div class="content">
        <div id="p-h" class="page active">
            <h1>LA ROSA</h1>
            <div id="list-h"></div>
        </div>

        <div id="p-t" class="page">
            <h1>STRATEGIA</h1>
            <div id="pitch">
                <div class="pitch-line penalty-area top"></div>
                <div class="mid-line"></div>
                <div class="pitch-line center-circle"></div>
                <div class="pitch-line penalty-area bot"></div>
                <div id="players-on-pitch"></div>
            </div>
            <button onclick="render()" style="width:100%; background:none; color:#444; border:none; margin-top:10px; font-size:10px;">RESET POSIZIONI</button>
        </div>

        <div id="p-n" class="page">
            <h1>COMUNICATI</h1>
            <div id="list-n"></div>
        </div>

        <div id="p-s" class="page">
            <h1>RANKING</h1>
            <div id="list-s"></div>
        </div>

        <div id="p-a" class="page">
            <h1>ADMIN</h1>
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-main" onclick="auth()">ACCEDI</button>
            <div id="adm-ui" style="display:none; margin-top:20px;">
                <div class="card">
                    <h3>NUOVA NOTIZIA</h3>
                    <input type="text" id="nt" placeholder="Titolo">
                    <textarea id="nc" rows="3" placeholder="Testo del comunicato..."></textarea>
                    <button class="btn-main" onclick="addN()">PUBBLICA NEWS</button>
                </div>
                <div class="card">
                    <h3>AGGIUNGI GIOCATORE</h3>
                    <input type="text" id="pn" placeholder="Nome">
                    <button class="btn-main" onclick="addG()">REGISTRA</button>
                </div>
                <div id="list-adm-g"></div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('milanac_v31') || '{"ps":[], "ns":[]}');

        function start() { document.getElementById('intro').style.display = 'none'; render(); }
        function toggleM() { const m = document.getElementById('menu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function vai(p) { document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.getElementById('p-'+p).classList.add('active'); toggleM(); render(); }
        function auth() { if(document.getElementById('pass').value === 'milan') document.getElementById('adm-ui').style.display='block'; }

        function addG() { const n = document.getElementById('pn').value; if(n) { db.ps.push({id: Date.now(), n, g:0, a:0, m:0, mvp:0, v:[], in: false}); save(); } }
        function addN() { const t = document.getElementById('nt').value, c = document.getElementById('nc').value; if(t && c) { db.ns.unshift({id: Date.now(), t, c, d: new Date().toLocaleDateString()}); save(); } }
        
        function save() { localStorage.setItem('milanac_v31', JSON.stringify(db)); render(); }

        function render() {
            // Squadra
            document.getElementById('list-h').innerHTML = db.ps.map(p => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${p.n.toUpperCase()}</b>
                        <span class="voto">MVP: ${p.mvp}</span>
                    </div>
                    <div style="margin-top:10px; font-size:12px; color:#666;">GOL: ${p.g} | ASSIST: ${p.a}</div>
                    <button class="btn-main" onclick="db.ps.find(x=>x.id===${p.id}).in=!db.ps.find(x=>x.id===${p.id}).in; save();" 
                    style="margin-top:15px; background:${p.in?'var(--red)':'#1a1a1a'}; height:40px;">${p.in?'CONVOCATO':'ASSENTE'}</button>
                </div>`).join('');

            // Notizie
            document.getElementById('list-n').innerHTML = db.ns.map(n => `
                <div class="card">
                    <small style="color:#444">${n.d}</small>
                    <h3 style="margin:5px 0; color:var(--red)">${n.t.toUpperCase()}</h3>
                    <p style="color:#888; font-size:14px; line-height:1.4">${n.c}</p>
                </div>`).join('');

            // Pitch
            const pitch = document.getElementById('players-on-pitch'); pitch.innerHTML = '';
            db.ps.filter(p => p.in).forEach((p, i) => {
                const d = document.createElement('div'); d.className = 'tag-player'; d.innerText = p.n.toUpperCase();
                d.style.left = '20px'; d.style.top = (i * 45 + 50) + 'px'; pitch.appendChild(d);
                d.addEventListener('touchmove', e => {
                    e.preventDefault(); let t = e.touches[0]; let r = document.getElementById('pitch').getBoundingClientRect();
                    d.style.left = (t.pageX - r.left - 40) + 'px'; d.style.top = (t.pageY - r.top - 15) + 'px';
                }, {passive: false});
            });

            // Admin
            document.getElementById('list-adm-g').innerHTML = db.ps.map(p => `
                <div class="card">
                    <b>${p.n}</b>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:10px;">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).g=parseInt(this.value);save()" value="${p.g}" placeholder="G">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).a=parseInt(this.value);save()" value="${p.a}" placeholder="A">
                    </div>
                    <button onclick="db.ps=db.ps.filter(x=>x.id!==${p.id});save()" style="color:red; background:none; border:none; margin-top:10px; width:100%">ELIMINA</button>
                </div>`).join('');
            
            // Ranking
            document.getElementById('list-s').innerHTML = [...db.ps].sort((a,b)=>(b.g+b.a)-(a.g+a.a)).map(p => `
                <div class="card" style="display:flex; justify-content:space-between;"><span>${p.n.toUpperCase()}</span><b>${p.g+p.a} PUNTI</b></div>`).join('');
        }
    </script>
</body>
</html>
