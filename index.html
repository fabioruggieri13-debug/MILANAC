<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC PRO</title>
    <style>
        :root { --neon: #ff0000; --bg: #000; --card: #151515; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* SCHERMATA DI PRESENTAZIONE */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.8s ease;
        }
        .logo-milanac {
            font-size: 3rem; font-weight: 900; color: var(--neon);
            text-shadow: 0 0 20px var(--neon); letter-spacing: 5px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* LAYOUT APP */
        #app-content { display: none; height: 100%; flex-direction: column; }
        .nav { display: flex; background: #1a1a1a; border-bottom: 2px solid var(--neon); height: 60px; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #777; }
        .nav-item.active { color: #fff; background: #222; box-shadow: inset 0 -3px 0 var(--neon); }

        .main { flex: 1; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .page { display: none; }
        .page.active { display: block; }

        /* ELEMENTI GRAFICI */
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #252525; }
        h1 { color: var(--neon); text-align: center; text-transform: uppercase; margin-bottom: 20px; }
        button { background: var(--neon); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; }

        /* CAMPO */
        #pitch { width: 100%; height: 400px; background: #1e4d2b; border: 2px solid white; position: relative; border-radius: 10px; overflow: hidden; touch-action: none; }
        .player { width: 42px; height: 42px; background: red; color: white; border-radius: 50%; position: absolute; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 2px solid white; font-weight: bold; z-index: 10; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-milanac">MILANAC</div>
        <p style="color: #444; margin-top: 20px; letter-spacing: 2px;">LOADING...</p>
    </div>

    <div id="app-content">
        <div class="nav">
            <div class="nav-item active" onclick="tab('h', this)">HOME</div>
            <div class="nav-item" onclick="tab('t', this)">CAMPO</div>
            <div class="nav-item" onclick="tab('s', this)">STATS</div>
            <div class="nav-item" onclick="tab('a', this)">ADMIN</div>
        </div>

        <div class="main">
            <div id="p-h" class="page active">
                <h1>APPELLO</h1>
                <div id="list-h"></div>
            </div>

            <div id="p-t" class="page">
                <div id="pitch">
                    <div style="position:absolute; top:50%; width:100%; height:1px; background:rgba(255,255,255,0.3)"></div>
                    <div id="players-pitch"></div>
                </div>
                <button onclick="render()">RESET POSIZIONI</button>
            </div>

            <div id="p-s" class="page">
                <h1>STATISTICHE</h1>
                <div class="card"><h3>
