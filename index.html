<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC PRO</title>
    <style>
        :root { --neon: #ff0000; --bg: #000; --card: #111; --field: #1e4d2b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        .nav-top { display: flex; background: #1a1a1a; height: 60px; border-bottom: 2px solid var(--neon); overflow-x: auto; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 15px; font-size: 10px; font-weight: bold; color: #777; white-space: nowrap; }
        .nav-item.active { color: var(--neon); background: #222; box-shadow: inset 0 -3px 0 var(--neon); }

        .container { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; }
        .page.active { display: block; }

        /* IL CAMPO DA CALCIO REALISTICO */
        #pitch { 
            width: 100%; height: 500px; background: var(--field); border-radius: 5px; position: relative; 
            border: 2px solid #fff; overflow: hidden; touch-action: none; margin-bottom: 10px;
        }
        .line { position: absolute; border: 1.5px solid rgba(255,255,255,0.7); }
        .center-line { width: 100%; top: 50%; left: 0; }
        .center-circle { width: 80px; height: 80px; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .penalty-area { width: 50%; height: 60px; border: 1.5px solid #fff; left: 25%; }
