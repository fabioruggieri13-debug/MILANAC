<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC V51 - MARKET EDITION</title>
    <style>
        :root { --red: #C61C23; --bg: #000; --card: #121212; --gold: #D4AF37; --grass: #1b5e20; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        /* HEADER */
        header { height: 65px; background: #050505; border-bottom: 3px solid var(--red); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: relative; z-index: 2000; }
        .burger { font-size: 35px; color: var(--red); cursor: pointer; }
        .nav { position: absolute; top: 65px; right: 0; background: #080808; width: 280px; display: none; flex-direction: column; border-left: 3px solid var(--red); z-index: 1900; height: calc(100vh - 65px); }
        .nav button { background: none; border: none; color: white; padding: 20px; text-align: left; border-bottom: 1px solid #1a1a1a; font-weight: 900; text-transform: uppercase; }

        .container { height: calc(100vh - 65px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; } .active { display: block; }

        /* CARDS */
        .card { background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border-radius: 12px; padding: 18px; margin-bottom: 20px; border-left: 5px solid var(--red); position: relative; }
        .valore-box { float: right; text-align: right; }
        .valore-cifra { color: #4caf50; font-weight: 900; font-size: 18px; display: block; }
        .trend { font-size: 10px; text-transform: uppercase; color: #888; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 15px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; }
        .stats-grid div { font-size: 11px; color: #777; }
        .stats-grid b { display: block; color: #fff; font-size: 15px; }

        .badge-voto { background: var(--gold); color: black; padding: 2px 6px; border-radius: 4px; font-weight: 900; font-size: 12px; }
        
        /* CAMPO */
        #pitch-box { width: 100%; height: 400px; background: var(--grass); border: 2px solid #fff; position: relative; overflow: hidden; border-radius: 8px; touch-action: none; }
        .line-center { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #fff; }
        .player-token { position: absolute; width: 55px; text-align: center; z-index: 100; }
        .shirt { width: 38px; height: 38px; background: #000; border: 2px solid var(--red); border-radius: 50%; color: #fff; font-weight: 900; display: flex; align-items: center; justify-content: center; margin: 0 auto; }

        .btn-p { background: var(--red); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; margin-bottom: 10px; border-radius: 6px; box-sizing: border-box; }
        h1 { font-weight: 900; color: var(--red); text-align: center; text-transform: uppercase; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <div style="color: var(--red); font-weight: 900; font-size: 24px;">MILANAC</div>
        <div class="burger" onclick="toggleNav()">☰</div>
        <nav id="nav" class="nav">
            <button onclick="showPage('home')">SQUADRA</button>
            <button onclick="showPage('lavagna')">LAVAGNA</button>
            <button onclick="showPage('stats')">CLASSIFICA & MERCATO</button>
            <button onclick="showPage('admin')">ADMIN (PAGELLE)</button>
        </nav>
    </header>

    <div class="container">
        <div id="page-home" class="page active">
            <h1>LA ROSA</h1>
            <div id="lista-giocatori"></div>
        </div>

        <div id="page-lavagna" class="page">
            <h1>TACTICS</h1>
            <div id="pitch-box">
                <div class="line-center"></div>
                <div id="players-on-pitch"></div>
            </div>
        </div>

        <div id="page-stats" class="page">
            <h1>MARKET VALUES</h1>
            <div id="ranking-list"></div>
        </div>

        <div id="page-admin" class="page">
            <h1>PAGELLE ADMIN</h1>
            <input type="password" id="adm-pass" placeholder="Password">
            <button class="btn-p" onclick="login()">ACCEDI</button>
            <div id="adm-box" style="display:none; margin-top:20px;">
                <div class="card">
                    <input type="text" id="g-n" placeholder="Nome">
                    <input type="number" id="g-num" placeholder="Numero">
                    <button class="btn-p" onclick="addG()">AGGIUNGI PLAYER</button>
                </div>
                <div id="adm-list-giocatori"></div>
            </div>
        </div>
    </div>

    <script>
        let db = { ps: [] };
        function load() {
            const saved = localStorage.getItem('milanac_v51');
            if(saved) db = JSON.parse(saved);
        }

        function calculateMarket(p) {
            let base = 10;
            let performance = (p.g * 5) + (p.a * 3) + (p.p * 1);
            let totalBase = base + performance;
            
            // Calcolo media voto
            if(p.v && p.v.length > 0) {
                let media = p.v.reduce((a,b)=>a+b,0) / p.v.length;
                // Il valore oscilla in base alla media (es: media 7 = +20%, media 5 = -20%)
                let moltiplicatore = media / 6; 
                return (totalBase * moltiplicatore).toFixed(1);
            }
            return totalBase.toFixed(1);
        }

        function toggleNav() { const m = document.getElementById('nav'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); toggleNav(); render(); }
        function login() { if(document.getElementById('adm-pass').value === 'milan') document.getElementById('adm-box').style.display='block'; }
        function save() { localStorage.setItem('milanac_v51', JSON.stringify(db)); render(); }

        function addG() { 
            const n = document.getElementById('g-n').value, num = document.getElementById('g-num').value;
            if(n && num) { db.ps.push({id:Date.now(), n, num, g:0, a:0, p:0, v:[], in:false}); save(); }
        }

        function setVoto(id) {
            let v = prompt("Inserisci voto della partita (es: 6.5)");
            if(v) {
                db.ps.find(x=>x.id===id).v.push(parseFloat(v.replace(',','.')));
                save();
            }
        }

        function render() {
            // SQUADRA
            document.getElementById('lista-giocatori').innerHTML = db.ps.map(p => {
                let m = p.v.length ? (p.v.reduce((a,b)=>a+b,0)/p.v.length).toFixed(2) : "-";
                return `<div class="card">
                    <div class="valore-box"><span class="trend">VALORE</span><span class="valore-cifra">€${calculateMarket(p)}M</span></div>
                    <b>#${p.num} ${p.n.toUpperCase()}</b>
                    <div style="margin-top:5px;"><span class="badge-voto">MEDIA: ${m}</span></div>
                    <div class="stats-grid">
                        <div><small>PRES</small><b>${p.p}</b></div>
                        <div><small>GOL</small><b>${p.g}</b></div>
                        <div><small>AST</small><b>${p.a}</b></div>
                        <div><small>VOTI</small><b>${p.v.length}</b></div>
                    </div>
                    <button class="btn-p" onclick="db.ps.find(x=>x.id===${p.id}).in=!db.ps.find(x=>x.id===${p.id}).in; save();" 
                    style="background:${p.in?'var(--red)':'#222'}">${p.in?'CONVOCATO':'ASSENTE'}</button>
                </div>`;
            }).join('');

            // CLASSIFICA MERCATO
            let sorted = [...db.ps].sort((a,b)=> calculateMarket(b) - calculateMarket(a));
            document.getElementById('ranking-list').innerHTML = sorted.map((p, i) => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span><b>${i+1}.</b> ${p.n}</span>
                        <b style="color:#4caf50;">€${calculateMarket(p)}M</b>
                    </div>
                </div>`).join('');

            // LAVAGNA
            const pitch = document.getElementById('players-on-pitch'); pitch.innerHTML = '';
            db.ps.filter(p => p.in).forEach((p, i) => {
                const tok = document.createElement('div');
                tok.className = 'player-token';
                tok.innerHTML = `<div class="shirt">${p.num}</div><div style="font-size:9px; font-weight:bold;">${p.n.split(' ')[0]}</div>`;
                tok.style.left = '20px'; tok.style.top = (i * 45 + 20) + 'px';
                pitch.appendChild(tok);
                tok.addEventListener('touchmove', e => {
                    e.preventDefault(); let t = e.touches[0]; let r = document.getElementById('pitch-box').getBoundingClientRect();
                    tok.style.left = (t.pageX - r.left - 25) + 'px'; tok.style.top = (t.pageY - r.top - 20) + 'px';
                }, {passive: false});
            });

            // ADMIN
            document.getElementById('adm-list-giocatori').innerHTML = db.ps.map(p => `
                <div class="card">
                    <b>${p.n}</b>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin:10px 0;">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).p=parseInt(this.value);save()" value="${p.p}" placeholder="P">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).g=parseInt(this.value);save()" value="${p.g}" placeholder="G">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).a=parseInt(this.value);save()" value="${p.a}" placeholder="A">
                    </div>
                    <button onclick="setVoto(${p.id})" style="background:var(--gold); border:none; padding:8px; width:100%; border-radius:4px; font-weight:bold;">AGGIUNGI VOTO PARTITA</button>
                    <button onclick="if(confirm('Eliminare?')){db.ps=db.ps.filter(x=>x.id!==${p.id});save()}" style="color:red; background:none; border:none; width:100%; margin-top:10px; font-size:10px;">ELIMINA</button>
                </div>`).join('');
        }

        load();
        render();
    </script>
</body>
</html>
