<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC Pro Hub</title>
    <style>
        :root { --neon: #ff0000; --bg: #0a0a0a; --card: #161616; --field: #0e351d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; }
        
        /* Navigazione Inferiore */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; border-top: 1px solid #333; height: 65px; z-index: 1000; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #666; text-transform: uppercase; font-weight: bold; }
        .tab-item.active { color: var(--neon); }
        .tab-icon { font-size: 20px; margin-bottom: 2px; }

        /* Pagine */
        .page { display: none; height: calc(100vh - 65px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .page.active { display: block; }

        /* Componenti */
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        h1 { color: var(--neon); text-align: center; margin: 0 0 15px 0; font-size: 1.8rem; text-shadow: 0 0 8px var(--neon); }
        button { background: var(--neon); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; margin: 5px 0; }
        
        /* Lavagna Tattica */
        #tacticalField { width: 100%; height: 75vh; background: var(--field); border-radius: 10px; position: relative; border: 2px solid white; overflow: hidden; touch-action: none; background-image: radial-gradient(circle at 50% 50%, transparent 15%, rgba(255,255,255,0.1) 16%, transparent 17%); }
        .player-token { width: 45px; height: 45px; background: var(--neon); color: white; border-radius: 50%; position: absolute; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; touch-action: none; }

        /* Lista e Rosa */
        .player-row { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 10px; border-radius: 8px; margin-bottom: 5px; }
        .roster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .roster-card { background: #1a1a1a; border-radius: 10px; text-align: center; padding: 10px; border: 1px solid #333; }
        .face-placeholder { width: 60px; height: 60px; background: #333; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; color: var(--neon); font-size: 20px; }
    </style>
</head>
<body>

    <div id="hub" class="page active">
        <h1>MILANAC</h1>
        <div class="card">
            <h2 style="font-size: 14px;">SESSIONE ATTIVA</h2>
            <div id="activeList"></div>
        </div>
    </div>

    <div id="tactic" class="page" style="padding: 10px;">
        <div id="tacticalField"></div>
        <button onclick="location.reload()" style="background:#333; margin-top:5px; font-size:10px;">RESET POSIZIONI</button>
    </div>

    <div id="rosa" class="page">
        <h2>ALMANACCO</h2>
        <div id="rosterGrid" class="roster-grid"></div>
    </div>

    <div id="admin" class="page">
        <h2>GESTIONE CLUB</h2>
        <div class="card">
            <input type="text" id="pName" placeholder="Gamertag">
            <select id="pRole">
                <option value="ATT">ATT</option><option value="CC">CC</option><option value="DIF">DIF</option><option value="POR">POR</option>
            </select>
            <button onclick="addPlayer()">AGGIUNGI PLAYER</button>
        </div>
        <div id="fullListAdmin"></div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchPage('hub', this)"><span>🏠</span>HUB</div>
        <div class="tab-item" onclick="switchPage('tactic', this)"><span>📋</span>TACTIC</div>
        <div class="tab-item" onclick="switchPage('rosa', this)"><span>👤</span>ROSA</div>
        <div class="tab-item" onclick="switchPage('admin', this)"><span>⚙️</span>ADMIN</div>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('milanac_v2') || "[]");

        function switchPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
            render();
        }

        function addPlayer() {
            const name = document.getElementById('pName').value;
            if(!name) return;
            players.push({ id: Date.now(), name, role: document.getElementById('pRole').value, present: false });
            document.getElementById('pName').value = "";
            save();
        }

        function toggle(id) {
            const p = players.find(x => x.id === id);
            p.present = !p.present;
            save();
        }

        function remove(id) {
            players = players.filter(x => x.id !== id);
            save();
        }

        function save() {
            localStorage.setItem('milanac_v2', JSON.stringify(players));
            render();
        }

        function render() {
            // Render Hub
            document.getElementById('activeList').innerHTML = players.map(p => `
                <div class="player-row">
                    <span>${p.name} <small>(${p.role})</small></span>
                    <button class="tab-icon" style="width:auto; padding:5px; background:${p.present?'var(--neon)':'#333'}" onclick="toggle(${p.id})">${p.present?'✅':'❌'}</button>
                </div>
            `).join('');

            // Render Tactic
            const field = document.getElementById('tacticalField');
            field.innerHTML = '';
            players.filter(p => p.present).forEach((p, index) => {
                const token = document.createElement('div');
                token.className = 'player-token';
                token.innerText = p.name.substring(0, 3).toUpperCase();
                token.style.left = '20px';
                token.style.top = (index * 55 + 20) + 'px';
                makeDraggable(token);
                field.appendChild(token);
            });

            // Render Rosa
            document.getElementById('rosterGrid').innerHTML = players.map(p => `
                <div class="roster-card">
                    <div class="face-placeholder">⚽</div>
                    <b>${p.name}</b><br><small>${p.role}</small>
                </div>
            `).join('');

            // Render Admin
            document.getElementById('fullListAdmin').innerHTML = players.map(p => `
                <div class="player-row">
                    <span>${p.name}</span>
                    <button onclick="remove(${p.id})" style="width:auto; background:grey; padding:5px 10px;">ELIMINA</button>
                </div>
            `).join('');
        }

        function makeDraggable(el) {
            let x = 0, y = 0;
            el.ontouchmove = e => {
                e.preventDefault();
                let touch = e.touches[0];
                el.style.left = (touch.pageX - 22) + 'px';
                el.style.top = (touch.pageY - 22) + 'px';
            }
        }

        window.onload = render;
    </script>
</body>
</html>
