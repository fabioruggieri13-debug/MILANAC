<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC APP</title>
    <style>
        :root { --neon: #ff0000; --bg: #0a0a0a; --card: #1a1a1a; --border: #333; }
        
        /* Reset e Base */
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Navigazione Superiore */
        .nav-top { display: flex; background: #222; border-bottom: 2px solid var(--neon); min-height: 60px; overflow-x: auto; flex-shrink: 0; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 10px; font-size: 11px; font-weight: bold; color: #aaa; text-transform: uppercase; border-right: 1px solid #333; }
        .nav-item.active { color: #fff; background: var(--neon); }

        /* Contenitore Principale */
        .main-container { flex: 1; overflow-y: auto; padding: 15px; box-sizing: border-box; -webkit-overflow-scrolling: touch; }
        .page { display: none; margin-bottom: 50px; }
        .page.active { display: block; }

        /* Componenti Grafici */
        h1 { font-size: 1.5rem; text-align: center; color: var(--neon); margin: 5px 0 15px 0; text-shadow: 0 0 5px rgba(255,0,0,0.5); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* Input e Bottoni */
        input, select, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; font-size: 16px; box-sizing: border-box; }
        input, select { background: #222; color: #fff; }
        button { background: var(--neon); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-small { width: auto; padding: 8px 15px; font-size: 12px; }

        /* Lista Giocatori */
        .row { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #333; }
        .row.active-p { border-color: var(--neon); background: #300; }

        /* CAMPO TATTICO */
        #field-box { 
            width: 100%; height: 450px; background: #1e4d2b; border: 2px solid #fff; border-radius: 8px; position: relative; overflow: hidden; touch-action: none; 
            background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .field-line { position: absolute; border: 2px solid white; opacity: 0.7; pointer-events: none; }
        .circle { width: 80px; height: 80px; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .player { width: 44px; height: 44px; background: var(--neon); color: white; border-radius: 50%; position: absolute; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border: 2px solid white; box-shadow: 0 4px 8px black; z-index: 10; }
    </style>
</head>
<body>

    <div class="nav-top">
        <div class="nav-item active" onclick="nav('home', this)">Appello</div>
        <div class="nav-item" onclick="nav('tactics', this)">Tattica</div>
        <div class="nav-item" onclick="nav('stats', this)">Stats</div>
        <div class="nav-item" onclick="nav('admin', this)">Admin</div>
    </div>

    <div class="main-container">
        <div id="p-home" class="page active">
            <h1>CONVOCATI</h1>
            <div id="list-home"></div>
        </div>

        <div id="p-tactics" class="page">
            <div id="field-box">
                <div class="field-line" style="width:100%; top:50%; border-width: 1px 0 0 0;"></div>
                <div class="field-line circle"></div>
                <div id="field-players"></div>
            </div>
            <button onclick="render()" style="background:#444">RIPRISTINA POSIZIONI</button>
        </div>

        <div id="p-stats" class="page">
            <h1>CLUB DATA</h1>
            <div class="card"><h3>PLAYER OF THE MONTH</h3><h2 id="view-potm" style="text-align:center">---</h2></div>
            <div class="card"><h3>GOL TOTALI</h3><h2 id="view-gol" style="text-align:center; color:red">0</h2></div>
        </div>

        <div id="p-admin" class="page">
            <h1>GESTIONE ADMIN</h1>
            <div id="auth-box">
                <input type="password" id="pass" placeholder="Password (milan)">
                <button onclick="unlock()">SBLOCCA</button>
            </div>
            <div id="admin-tools" style="display:none">
                <div class="card">
                    <h3>AGGIUNGI PLAYER</h3>
                    <input type="text" id="in-name" placeholder="Nome Giocatore">
                    <select id="in-role"><option>ATT</option><option>CC</option><option>DIF</option><option>POR</option></select>
                    <button onclick="addP()">AGGIUNGI</button>
                </div>
                <div class="card">
                    <h3>AGGIORNA STATS</h3>
                    <input type="text" id="in-potm" placeholder="Vincitore POTM">
                    <input type="number" id="in-gol" placeholder="Gol Totali">
                    <button onclick="upStats()">SALVA DATI</button>
                </div>
                <div id="list-admin"></div>
            </div>
        </div>
    </div>

    <script>
        let club = JSON.parse(localStorage.getItem('milanac_v8') || '{"members":[], "potm":"Nessuno", "gol":0}');

        function nav(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            el.classList.add('active');
            render();
        }

        function unlock() { if(document.getElementById('pass').value === "milan") { document.getElementById('auth-box').style.display='none'; document.getElementById('admin-tools').style.display='block'; } }

        function addP() {
            const n = document.getElementById('in-name').value;
            if(!n) return;
            club.members.push({ id: Date.now(), n, r: document.getElementById('in-role').value, in: false });
            save();
        }

        function upStats() {
            club.potm = document.getElementById('in-potm').value || club.potm;
            club.gol = document.getElementById('in-gol').value || club.gol;
            save();
        }

        function toggleP(id) {
            const p = club.members.find(x => x.id === id);
            p.in = !p.in;
            save();
        }

        function delP(id) { club.members = club.members.filter(x => x.id !== id); save(); }

        function save() { localStorage.setItem('milanac_v8', JSON.stringify(club)); render(); }

        function render() {
            // Liste
            document.getElementById('list-home').innerHTML = club.members.map(p => `
                <div class="row ${p.in?'active-p':''}">
                    <span><b>${p.n}</b> <small>(${p.r})</small></span>
                    <button class="btn-small" onclick="toggleP(${p.id})">${p.in?'IN':'OUT'}</button>
                </div>
            `).join('') || "<p style='text-align:center'>Aggiungi player in Admin</p>";

            document.getElementById('list-admin').innerHTML = club.members.map(p => `
                <div class="row"><span>${p.n}</span><button onclick="delP(${p.id})" style="width:auto; background:#444">X</button></div>
            `).join('');

            // Tattica
            const field = document.getElementById('field-players');
            field.innerHTML = '';
            club.members.filter(p => p.in).forEach((p, i) => {
                const d = document.createElement('div');
                d.className = 'player';
                d.innerText = p.n.substring(0,3).toUpperCase();
                d.style.left = '20px';
                d.style.top = (i * 50 + 20) + 'px';
                field.appendChild(d);
                makeDrag(d);
            });

            document.getElementById('view-potm').innerText = club.potm;
            document.getElementById('view-gol').innerText = club.gol;
        }

        function makeDrag(el) {
            el.ontouchmove = e => {
                e.preventDefault();
                let t = e.touches[0];
                let r = document.getElementById('field-box').getBoundingClientRect();
                el.style.left = (t.pageX - r.left - 22) + 'px';
                el.style.top = (t.pageY - r.top - 22) + 'px';
            };
        }
        window.onload = render;
    </script>
</body>
</html>
