<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC ULTIMATE</title>
    <link rel="icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        :root { --red: #ff0000; --bg: #000; --card: #121212; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }

        /* SPLASH SCREEN CON OVERRIDE */
        #splash { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .logo-anim { font-size: 3rem; font-weight: 900; color: var(--red); text-shadow: 0 0 20px var(--red); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* APP CONTENT */
        #app-content { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: opacity 0.5s ease; }
        .content { flex: 1; overflow-y: auto; padding: 15px; background: radial-gradient(circle at center, #151515 0%, #000 100%); }
        
        .nav { display: flex; background: #080808; border-top: 2px solid var(--red); height: 75px; flex-shrink: 0; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #555; }
        .nav-btn.active { color: #fff; background: #111; box-shadow: inset 0 3px 0 var(--red); }

        /* CARD FC26 */
        .fc-card {
            width: 260px; height: 380px; margin: 10px auto; background: linear-gradient(135deg, #000 0%, #ff0000 50%, #000 100%);
            clip-path: polygon(10% 0, 90% 0, 100% 15%, 100% 85%, 50% 100%, 0 85%, 0 15%);
            position: relative; padding: 2px;
        }
        .fc-inner { background: #000; height: 100%; width: 100%; clip-path: inherit; position: relative; text-align: center; }
        .ovr { position: absolute; top: 35px; left: 25px; font-size: 50px; font-weight: 900; color: var(--red); }
        .p-name { margin-top: 180px; font-size: 24px; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid var(--red); width: 80%; margin-left: 10%; }

        /* CAMPO */
        #pitch { width: 100%; height: 350px; background: #1e4d2b; border: 2px solid white; position: relative; border-radius: 10px; }
        .player-dot { width: 35px; height: 35px; background: red; color: white; border-radius: 50%; position: absolute; display: flex; align-items: center; justify-content: center; font-size: 9px; border: 2px solid white; font-weight: bold; }

        .card-ui { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #222; }
        button { background: var(--red); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 8px; }
        .page { display: none; } .page.active { display: block; }
    </style>
</head>
<body>

    <div id="splash" onclick="startApp()">
        <div class="logo-anim">MILANAC</div>
        <div style="color: #444; margin-top: 10px;">TOCCA PER ENTRARE</div>
    </div>

    <div id="app-content">
        <div class="content">
            <div id="pg-h" class="page active"><h1>LINEUP</h1><div id="list-h"></div></div>
            <div id="pg-t" class="page"><h1>PITCH</h1><div id="pitch"><div id="pitch-pl"></div></div></div>
            <div id="pg-p" class="page">
                <h1>MY CARD</h1>
                <div class="fc-card"><div class="fc-inner">
                    <div class="ovr" id="c-ovr">--</div>
                    <div class="p-name" id="c-name">PLAYER</div>
                    <div style="display:flex; justify-content:center; gap:15px; margin-top:20px;">
                        <div><div id="c-gol" style="color:red; font-size:20px;">0</div><div style="font-size:10px;">GOL</div></div>
                        <div><div id="c-match" style="color:red; font-size:20px;">0</div><div style="font-size:10px;">GARA</div></div>
                    </div>
                </div></div>
                <button onclick="setUser()">IDENTIFICATI</button>
            </div>
            <div id="pg-a" class="page">
                <h1>ADMIN</h1>
                <input type="password" id="pw" placeholder="Password"><button onclick="auth()">LOG IN</button>
                <div id="adm-ui" style="display:none; margin-top:20px;">
                    <div class="card-ui">
                        <input type="text" id="add-n" placeholder="Nome">
                        <select id="add-r"><option>ATT</option><option>CC</option><option>DIF</option><option>POR</option></select>
                        <button onclick="add()">AGGIUNGI</button>
                    </div>
                    <div id="list-adm"></div>
                </div>
            </div>
        </div>
        <div class="nav">
            <div class="nav-btn active" onclick="tab('h', this)">LISTA</div>
            <div class="nav-btn" onclick="tab('t', this)">CAMPO</div>
            <div class="nav-btn" onclick="tab('p', this)">CARD</div>
            <div class="nav-btn" onclick="tab('a', this)">ADMIN</div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('m_v17') || '{"players":[]}');

        function startApp() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
                document.getElementById('app-content').style.opacity = '1';
                render();
            }, 500);
        }

        // Forza l'avvio dopo 3 secondi se l'utente non tocca
        setTimeout(startApp, 3000);

        function tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('pg-'+id).classList.add('active');
            el.classList.add('active');
            render();
        }

        function auth() { if(document.getElementById('pw').value === "milan") document.getElementById('adm-ui').style.display='block'; }
        function add() {
            const n = document.getElementById('add-n').value;
            if(n) db.players.push({id: Date.now(), n, r: document.getElementById('add-r').value, in: false, g:0, m:0});
            save();
        }
        function toggle(id) {
            const p = db.players.find(x => x.id === id); p.in = !p.in;
            if(p.in) p.m++; save();
        }
        function setUser() {
            const n = prompt("Nome:");
            const p = db.players.find(x => x.n.toLowerCase() === n.toLowerCase());
            if(p) { localStorage.setItem('my_id', p.id); render(); }
        }
        function save() { localStorage.setItem('m_v17', JSON.stringify(db)); render(); }

        function render() {
            document.getElementById('list-h').innerHTML = db.players.map(p => `
                <div class="card-ui" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>${p.n.toUpperCase()}</span>
                    <button onclick="toggle(${p.id})" style="width:auto; background:${p.in?'red':'#222'}">${p.in?'IN':'OUT'}</button>
                </div>
            `).join('') || "Aggiungi giocatori in ADMIN";

            const f = document.getElementById('pitch-pl'); f.innerHTML = '';
            db.players.filter(p => p.in).forEach((p, i) => {
                const d = document.createElement('div'); d.className = 'player-dot'; d.innerText = p.n.substring(0,3).toUpperCase();
                d.style.left = '20px'; d.style.top = (i*40+10)+'px'; f.appendChild(d);
                d.ontouchmove = e => {
                    let t = e.touches[0]; let r = document.getElementById('pitch').getBoundingClientRect();
                    d.style.left = (t.pageX - r.left - 17) + 'px'; d.style.top = (t.pageY - r.top - 17) + 'px';
                };
            });

            const me = db.players.find(x => x.id == localStorage.getItem('my_id'));
            if(me) {
                document.getElementById('c-name').innerText = me.n;
                document.getElementById('c-gol').innerText = me.g;
                document.getElementById('c-match').innerText = me.m;
                document.getElementById('c-ovr').innerText = Math.min(99, 70 + me.m);
            }
            
            document.getElementById('list-adm').innerHTML = db.players.map(p => `
                <div class="card-ui" style="display:flex; justify-content:space-between;">
                    <span>${p.n}</span><button onclick="db.players=db.players.filter(x=>x.id!=${p.id});save()" style="width:auto; background:#333;">X</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
