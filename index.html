<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC - Tactical Hub</title>
    <style>
        :root { --neon: #ff0000; --bg: #050505; --card: #141414; --field: #0a2e18; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; overflow-x: hidden; touch-action: manipulation; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        h1 { color: var(--neon); text-align: center; letter-spacing: 3px; font-size: 1.5rem; text-shadow: 0 0 10px var(--neon); }
        
        /* CAMPO TATTICO */
        #tacticalField { 
            width: 100%; height: 380px; background: var(--field); border-radius: 8px; position: relative; 
            border: 2px solid rgba(255,255,255,0.2); overflow: hidden; touch-action: none;
            background-image: radial-gradient(circle at 50% 50%, transparent 18%, rgba(255,255,255,0.1) 19%, transparent 20%), 
                              linear-gradient(to bottom, transparent 49%, rgba(255,255,255,0.1) 50%, transparent 51%);
        }
        .player-token { 
            width: 45px; height: 45px; background: var(--neon); color: white; border-radius: 50%; 
            position: absolute; display: flex; align-items: center; justify-content: center; 
            font-size: 11px; font-weight: bold; cursor: move; touch-action: none; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.6); z-index: 100; border: 2px solid white;
        }

        /* UI GENERALE */
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: none; box-sizing: border-box; font-size: 14px; background: #222; color: white; }
        button { background: var(--neon); color: white; font-weight: bold; cursor: pointer; }
        .player-item { background: #1a1a1a; padding: 10px; margin: 5px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #444; }
        .present { border-left-color: var(--neon); background: #1f1111; }
        .btn-s { width: auto; padding: 6px 12px; font-size: 11px; }
    </style>
</head>
<body>

    <h1>MILANAC</h1>

    <div class="card">
        <h2 style="font-size: 14px; color: var(--neon);">LAVAGNA TATTICA (Trascina i Player)</h2>
        <div id="tacticalField"></div>
        <button onclick="location.reload()" style="background:#333; margin-top:10px; font-size:10px;">RESET POSIZIONI</button>
    </div>

    <div class="card">
        <h2 style="font-size: 14px;">CONVOCATI</h2>
        <div id="playerList"></div>
    </div>

    <div class="card">
        <h2 style="font-size: 14px;">AGGIUNGI PLAYER</h2>
        <input type="text" id="playerName" placeholder="Gamertag">
        <select id="role">
            <option value="ATT">ATT</option><option value="CC">CC</option><option value="DIF">DIF</option><option value="POR">POR</option>
        </select>
        <button onclick="addPlayer()">AGGIUNGI</button>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('milanac_players') || "[]");

        function save() { 
            localStorage.setItem('milanac_players', JSON.stringify(players)); 
            render(); 
        }

        function addPlayer() {
            const name = document.getElementById('playerName').value;
            if (!name) return;
            players.push({ id: Date.now(), name, role: document.getElementById('role').value, present: false });
            document.getElementById('playerName').value = "";
            save();
        }

        function togglePresence(id) {
            const p = players.find(x => x.id === id);
            p.present = !p.present;
            save();
        }

        function render() {
            // Render Lista
            const container = document.getElementById('playerList');
            container.innerHTML = players.map(p => `
                <div class="player-item ${p.present ? 'present' : ''}">
                    <div><strong>${p.name}</strong> <small>(${p.role})</small></div>
                    <button class="btn-s" style="background:${p.present ? 'var(--neon)':'#444'}" onclick="togglePresence(${p.id})">${p.present ? 'IN':'OUT'}</button>
                </div>
            `).join('');

            // Render Tokens sul Campo
            const field = document.getElementById('tacticalField');
            field.innerHTML = '';
            players.filter(p => p.present).forEach((p, index) => {
                const token = document.createElement('div');
                token.className = 'player-token';
                token.innerText = p.name.substring(0, 3).toUpperCase();
                token.style.left = '20px';
                token.style.top = (index * 50 + 20) + 'px';
                makeDraggable(token);
                field.appendChild(token);
            });
        }

        function makeDraggable(el) {
            let active = false;
            let currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

            const dragStart = (e) => {
                const clientX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
                initialX = clientX - xOffset;
                initialY = clientY - yOffset;
                if (e.target === el) active = true;
            };

            const dragEnd = () => {
                initialX = currentX;
                initialY = currentY;
                active = false;
            };

            const drag = (e) => {
                if (active) {
                    e.preventDefault();
                    const clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
                    const clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;
                    currentX = clientX - initialX;
                    currentY = clientY - initialY;
                    xOffset = currentX;
                    yOffset = currentY;
                    setTranslate(currentX, currentY, el);
                }
            };

            const setTranslate = (xPos, yPos, el) => {
                el.style.transform = "translate3d(" + xPos + "px, " + yPos + "px, 0)";
            };

            document.addEventListener("touchstart", dragStart, false);
            document.addEventListener("touchend", dragEnd, false);
            document.addEventListener("touchmove", drag, { passive: false });
            document.addEventListener("mousedown", dragStart, false);
            document.addEventListener("mouseup", dragEnd, false);
            document.addEventListener("mousemove", drag, false);
        }

        window.onload = render;
    </script>
</body>
</html>
