<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC V27</title>
    <style>
        :root { --red: #C61C23; --bg: #000; --card: #151515; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; }

        /* Schermata di Emergenza */
        #intro { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 10000;
        }
        .btn-start { 
            background: var(--red); color: white; border: none; padding: 25px 30px; 
            font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer;
            box-shadow: 0 5px 20px rgba(198, 28, 35, 0.5); width: 80%;
        }

        /* Layout Principale */
        header { height: 60px; background: #111; border-bottom: 2px solid var(--red); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        .content { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; box-sizing: border-box; display: block; }
        .page { display: none; }
        .active { display: block; }

        /* Componenti */
        .card { background: var(--card); border: 1px solid #333; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .burger { font-size: 30px; color: var(--red); }
        .menu { position: absolute; top: 60px; right: 0; background: #1a1a1a; width: 200px; display: none; flex-direction: column; border: 1px solid var(--red); z-index: 999; }
        .menu button { background: none; border: none; color: white; padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        
        input, textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; margin-bottom: 10px; border-radius: 5px; box-sizing: border-box; }
        .primary { background: var(--red); color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div id="intro">
        <h1 style="color: var(--red); font-size: 45px; margin-bottom: 40px;">MILANAC</h1>
        <button class="btn-start" onclick="forzaAvvio()">ENTRA NELL'APP</button>
        <p style="color: #444; margin-top: 30px;" onclick="resetTotale()">Reset Dati (Usa solo se non va)</p>
    </div>

    <header>
        <div style="color: var(--red); font-weight: 900; font-size: 20px;">MILANAC</div>
        <div class="burger" onclick="toggleM()">☰</div>
        <div id="dropdown" class="menu">
            <button onclick="vai('h')">SQUADRA</button>
            <button onclick="vai('n')">NOTIZIE</button>
            <button onclick="vai('a')">ADMIN</button>
        </div>
    </header>

    <div class="content">
        <div id="p-h" class="page active">
            <h2 style="color:var(--red)">LA ROSA</h2>
            <div id="lista"></div>
        </div>

        <div id="p-n" class="page">
            <h2 style="color:var(--red)">NEWS</h2>
            <div id="news"></div>
        </div>

        <div id="p-a" class="page">
            <h2 style="color:var(--red)">ADMIN</h2>
            <input type="password" id="pass" placeholder="Password (milan)">
            <button class="primary" onclick="checkA()">ACCEDI</button>
            <div id="area-admin" style="display:none; margin-top:20px;">
                <div class="card">
                    <input type="text" id="new-p" placeholder="Nome Giocatore">
                    <button class="primary" onclick="aggiungiP()">AGGIUNGI</button>
                </div>
                <div id="lista-admin"></div>
            </div>
        </div>
    </div>

    <script>
        let dati = { giocatori: [], news: [] };

        // Caricamento super-sicuro
        function carica() {
            try {
                const locale = localStorage.getItem('milanac_v27');
                if (locale) dati = JSON.parse(locale);
            } catch(e) { console.error("Errore storage"); }
        }

        function forzaAvvio() {
            carica();
            document.getElementById('intro').style.display = 'none';
            if (dati.giocatori.length === 0) {
                dati.giocatori.push({id: 1, n: "Nuovo Giocatore", g:0, a:0, in: false});
            }
            render();
        }

        function resetTotale() {
            localStorage.clear();
            location.reload();
        }

        function toggleM() {
            const m = document.getElementById('dropdown');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function vai(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            toggleM();
            render();
        }

        function checkA() {
            if(document.getElementById('pass').value === 'milan') {
                document.getElementById('area-admin').style.display = 'block';
                render();
            }
        }

        function aggiungiP() {
            const n = document.getElementById('new-p').value;
            if(n) {
                dati.giocatori.push({id: Date.now(), n: n, g: 0, a: 0, in: false});
                document.getElementById('new-p').value = '';
                salva();
            }
        }

        function salva() {
            localStorage.setItem('milanac_v27', JSON.stringify(dati));
            render();
        }

        function render() {
            // Rendering lista home
            document.getElementById('lista').innerHTML = dati.giocatori.map(g => `
                <div class="card">
                    <div style="font-weight:bold; font-size:18px;">${g.n.toUpperCase()}</div>
                    <div style="margin-top:10px; color:#aaa;">GOL: ${g.g} | ASSIST: ${g.a}</div>
                    <button class="primary" onclick="toggleP(${g.id})" style="margin-top:10px; background:${g.in? 'var(--red)':'#333'}">
                        ${g.in ? 'PRESENTE' : 'ASSENTE'}
                    </button>
                </div>
            `).join('');

            // Rendering lista admin
            document.getElementById('lista-admin').innerHTML = dati.giocatori.map(g => `
                <div class="card" style="border-color:var(--red)">
                    <b>${g.n}</b>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <input type="number" value="${g.g}" onchange="edit(${g.id}, 'g', this.value)" style="margin:0">
                        <input type="number" value="${g.a}" onchange="edit(${g.id}, 'a', this.value)" style="margin:0">
                    </div>
                    <button onclick="elimina(${g.id})" style="background:none; border:none; color:red; margin-top:10px; width:100%">Elimina</button>
                </div>
            `).join('');
        }

        function toggleP(id) {
            const g = dati.giocatori.find(x => x.id === id);
            g.in = !g.in;
            salva();
        }

        function edit(id, campo, val) {
            const g = dati.giocatori.find(x => x.id === id);
            g[campo] = parseInt(val) || 0;
            salva();
        }

        function elimina(id) {
            if(confirm('Eliminare giocatore?')) {
                dati.giocatori = dati.giocatori.filter(x => x.id !== id);
                salva();
            }
        }
    </script>
</body>
</html>
