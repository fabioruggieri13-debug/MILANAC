<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC PROCLUB V81 - SUPREME CLOUD</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --rosso: #C61C23; --nero: #000; --scuro: #0a0a0a; --oro: #D4AF37; --erba: #2e7d32; --erba-scura: #1b5e20; }
        body, html { margin: 0; padding: 0; background: var(--nero); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* INTRO SPETTACOLARE PULSANTE */
        #intro { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #220000 0%, #000 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10000; text-align: center;
            animation: heartbeat 2s infinite ease-in-out;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); background: radial-gradient(circle at center, #330000 0%, #000 100%); }
            5% { transform: scale(1.03); background: radial-gradient(circle at center, #440000 0%, #000 100%); }
            10% { transform: scale(1); }
            15% { transform: scale(1.02); }
            20% { transform: scale(1); }
        }

        .titolo-milanac { 
            font-size: 3.5rem; font-weight: 900; 
            background: linear-gradient(to right, #fff 20%, var(--oro) 40%, var(--rosso) 60%, #fff 80%);
            background-size: 200% auto;
            -webkit-background-clip: text; color: transparent;
            animation: shine 3s linear infinite;
            text-transform: uppercase; letter-spacing: -2px;
            filter: drop-shadow(0 0 15px rgba(198, 28, 35, 0.5));
        }

        @keyframes shine { to { background-position: 200% center; } }

        .welcome-msg { 
            font-size: 1.3rem; margin-bottom: 40px; color: #fff; 
            text-transform: uppercase; letter-spacing: 3px; font-weight: 700;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: pulseText 1.5s infinite;
        }

        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .btn-entra-pro {
            background: linear-gradient(135deg, var(--rosso) 0%, #660000 100%);
            color: white; border: 2px solid var(--oro); padding: 20px 60px;
            border-radius: 50px; font-weight: 900; font-size: 1.2rem;
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0 0 20px var(--rosso);
            transition: 0.3s;
        }
        .btn-entra-pro:active { transform: scale(0.9); box-shadow: 0 0 5px var(--rosso); }

        /* HEADER E NAV */
        header { height: 65px; background: #000; border-bottom: 2px solid var(--rosso); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: relative; z-index: 2000; }
        .burger { font-size: 30px; color: var(--rosso); }
        .nav-laterale { position: absolute; top: 65px; right: 0; background: #050505; width: 260px; display: none; flex-direction: column; border-left: 2px solid var(--rosso); height: calc(100vh - 65px); z-index: 1900; }
        .nav-laterale button { background: none; border: none; color: white; padding: 18px; text-align: left; border-bottom: 1px solid #111; font-weight: bold; text-transform: uppercase; font-size: 11px; }

        /* SEZIONI V81 */
        .area-principale { height: calc(100vh - 65px); overflow-y: auto; padding: 10px; box-sizing: border-box; }
        .pagina { display: none; } .attiva { display: block; }
        .titolo-ruolo { background: #111; color: var(--oro); padding: 10px; margin: 20px 0 10px; border-radius: 4px; font-weight: 900; text-align: center; border: 1px solid #222; letter-spacing: 2px; }
        .scheda { background: #0f0f0f; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--rosso); box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .prezzo { float: right; color: #4caf50; font-weight: 900; }
        .nome-link { color: var(--rosso); text-decoration: underline; font-weight: bold; cursor: pointer; }

        /* CAMPO E MODULI */
        .selettore-moduli { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; }
        .btn-modulo { background: #1a1a1a; border: 1px solid var(--oro); color: var(--oro); padding: 8px 2px; font-size: 10px; font-weight: bold; border-radius: 4px; }
        .btn-modulo.active { background: var(--oro); color: black; }
        
        #pitch { width: 92vw; height: 125vw; max-height: 480px; background: var(--erba); border: 3px solid #fff; border-radius: 5px; position: relative; overflow: hidden; margin: 0 auto; background-image: repeating-linear-gradient(0deg, var(--erba), var(--erba) 40px, var(--erba-scura) 40px, var(--erba-scura) 80px); }
        .pedina { position: absolute; width: 55px; text-align: center; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .maglia { width: 42px; height: 42px; background: #000; border: 2px solid var(--rosso); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; margin: 0 auto; font-size: 14px; box-shadow: 0 5px 10px rgba(0,0,0,0.5); }
        .nome-p { background: rgba(0,0,0,0.85); font-size: 9px; padding: 2px 5px; border-radius: 3px; margin-top: 3px; display: inline-block; font-weight: bold; }

        /* MODALE STATS */
        #modal-p { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; display: none; flex-direction: column; padding: 30px 20px; text-align: center; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .stat-box { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div id="intro">
        <h1 class="titolo-milanac">MILANAC PROCLUB</h1>
        <p class="welcome-msg">Benvenuto rossonero, entra nel club!</p>
        <button class="btn-entra-pro" onclick="document.getElementById('intro').style.display='none'">ENTRA NEL CLUB</button>
    </div>

    <div id="modal-p">
        <div style="text-align:right; font-size:35px; color:var(--rosso);" onclick="document.getElementById('modal-p').style.display='none'">✕</div>
        <div id="info-p"></div>
    </div>

    <header>
        <div style="font-weight:900; color:var(--rosso); font-size:22px;">MILANAC</div>
        <div class="burger" onclick="toggleNav()">☰</div>
        <nav id="nav" class="nav-laterale">
            <button onclick="vai('rosa')">La Squadra</button>
            <button onclick="vai('tattica')">Lavagna Tattica</button>
            <button onclick="vai('partite')">Cronologia Partite</button>
            <button onclick="vai('mercato')">Valori Mercato</button>
            <button onclick="vai('premi')">Bacheca Premi</button>
            <button onclick="vai('admin')">Admin Area</button>
        </nav>
    </header>

    <div class="area-principale">
        <div id="p-rosa" class="pagina attiva"><h2 style="text-align:center">LA ROSA</h2><div id="lista-rosa"></div></div>
        
        <div id="p-tattica" class="pagina">
            <h2 style="text-align:center">FORMAZIONE</h2>
            <div class="selettore-moduli">
                <button class="btn-modulo" onclick="applicaModulo('4-4-2', this)">4-4-2</button>
                <button class="btn-modulo" onclick="applicaModulo('4-3-3', this)">4-3-3</button>
                <button class="btn-modulo" onclick="applicaModulo('3-5-2', this)">3-5-2</button>
                <button class="btn-modulo" onclick="applicaModulo('3-4-1-2', this)">3-4-1-2</button>
            </div>
            <div id="pitch"><div id="pedine-campo"></div></div>
        </div>

        <div id="p-partite" class="pagina"><h2 style="text-align:center">MATCH HISTORY</h2><div id="lista-partite"></div></div>
        <div id="p-mercato" class="pagina"><h2 style="text-align:center">MERCATO</h2><div id="lista-mercato"></div></div>
        <div id="p-premi" class="pagina"><h2 style="text-align:center; color:var(--oro)">HALL OF FAME</h2><div id="lista-premi"></div></div>

        <div id="p-admin" class="pagina">
            <h2 style="text-align:center">ADMIN</h2>
            <input type="password" id="pass-admin" placeholder="Password">
            <button class="btn-entra-pro" style="padding:10px; width:100%" onclick="if(document.getElementById('pass-admin').value==='milan') document.getElementById('box-admin').style.display='block'">ACCEDI</button>
            <div id="box-admin" style="display:none; margin-top:20px;">
                <input type="text" id="n-nome" placeholder="Nome">
                <input type="number" id="n-maglia" placeholder="N°">
                <select id="n-ruolo"><option value="POR">POR</option><option value="DIF">DIF</option><option value="CEN">CEN</option><option value="ATT">ATT</option></select>
                <button class="btn-entra-pro" style="padding:10px; width:100%" onclick="addP()">AGGIUNGI</button>
                <div id="adm-list"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDbO_AxHKz1avQpYscoSSLpEfmFaL8MRGg",
            authDomain: "milanac-proclub.firebaseapp.com",
            projectId: "milanac-proclub",
            storageBucket: "milanac-proclub.firebasestorage.app",
            messagingSenderId: "61702234008",
            appId: "1:61702234008:web:aa597d8600d0a8251895ed"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let clubData = { ps: [], mod: '4-4-2' };

        db.collection("milanac").doc("dati").onSnapshot(doc => {
            if(doc.exists) { clubData = doc.data(); render(); }
        });

        function sync() { db.collection("milanac").doc("dati").set(clubData); }
        function toggleNav() { const n = document.getElementById('nav'); n.style.display = (n.style.display==='flex')?'none':'flex'; }
        function vai(p) { document.querySelectorAll('.pagina').forEach(x=>x.classList.remove('attiva')); document.getElementById('p-'+p).classList.add('attiva'); toggleNav(); }

        function addP() {
            const n = document.getElementById('n-nome').value, m = document.getElementById('n-maglia').value, r = document.getElementById('n-ruolo').value;
            if(n && m) {
                clubData.ps.push({id: Date.now(), n, m, r, g:0, potm:0, convocato:false});
                sync();
            }
        }

        const schemi = {
            '4-4-2': [{x:50,y:85},{x:20,y:70},{x:40,y:70},{x:60,y:70},{x:80,y:70},{x:20,y:45},{x:40,y:45},{x:60,y:45},{x:80,y:45},{x:40,y:20},{x:60,y:20}],
            '4-3-3': [{x:50,y:85},{x:20,y:70},{x:40,y:70},{x:60,y:70},{x:80,y:70},{x:30,y:45},{x:50,y:45},{x:70,y:45},{x:20,y:20},{x:50,y:15},{x:80,y:20}],
            '3-5-2': [{x:50,y:85},{x:30,y:70},{x:50,y:70},{x:70,y:70},{x:15,y:45},{x:35,y:45},{x:50,y:45},{x:65,y:45},{x:85,y:45},{x:40,y:20},{x:60,y:20}],
            '3-4-1-2': [{x:50,y:85},{x:30,y:70},{x:50,y:70},{x:70,y:70},{x:20,y:45},{x:40,y:45},{x:60,y:45},{x:80,y:45},{x:50,y:30},{x:40,y:15},{x:60,y:15}]
        };

        function applicaModulo(m, b) { clubData.mod = m; sync(); }

        function apriScheda(id) {
            const p = clubData.ps.find(x => x.id == id);
            document.getElementById('info-p').innerHTML = `
                <h1 style="font-size:4rem; color:var(--rosso); margin:0">#${p.m}</h1>
                <h2>${p.n.toUpperCase()}</h2>
                <div class="stat-grid">
                    <div class="stat-box"><small>GOL</small>${p.g}</div>
                    <div class="stat-box"><small>POTM</small>${p.potm}</div>
                    <div class="stat-box"><small>VALORE</small>€${(10+p.g*5+p.potm*10).toFixed(1)}M</div>
                </div>
            `;
            document.getElementById('modal-p').style.display = 'flex';
        }

        function render() {
            const ruoli = ["POR", "DIF", "CEN", "ATT"];
            const labels = { POR: "PORTIERI", DIF: "DIFENSORI", CEN: "CENTROCAMPISTI", ATT: "ATTACCANTI" };
            let hRosa = "", hMercato = "", hPremi = "";

            ruoli.forEach(ruolo => {
                const filtrati = clubData.ps.filter(p => p.r === ruolo);
                if(filtrati.length) {
                    hRosa += `<div class="titolo-ruolo">${labels[ruolo]}</div>`;
                    hMercato += `<div class="titolo-ruolo">${labels[ruolo]}</div>`;
                    filtrati.forEach(p => {
                        hRosa += `<div class="scheda" style="border-left-color:${p.convocato?'#4caf50':'var(--rosso)'}">
                            <span class="prezzo">#${p.m}</span>
                            <span class="nome-link" onclick="apriScheda(${p.id})">${p.n.toUpperCase()}</span><br>
                            <button class="btn-entra-pro" style="margin-top:10px; padding:8px; font-size:11px; width:auto; border-radius:5px; background:${p.convocato?'#4caf50':'#222'};" onclick="const i=clubData.ps.findIndex(x=>x.id==${p.id}); clubData.ps[i].convocato=!clubData.ps[i].convocato; sync();">
                                ${p.convocato?'CONVOCATO ✅':'NON CONVOCATO'}
                            </button>
                        </div>`;
                        hMercato += `<div class="scheda"><span class="prezzo">€${(10+p.g*5+p.potm*10).toFixed(1)}M</span><b>#${p.m} ${p.n}</b></div>`;
                        if(p.potm > 0) hPremi += `<div class="scheda"><b>${p.n}</b> - POTM x${p.potm}</div>`;
                    });
                }
            });

            document.getElementById('lista-rosa').innerHTML = hRosa || "<p style='text-align:center'>Rosa vuota</p>";
            document.getElementById('lista-mercato').innerHTML = hMercato;
            document.getElementById('lista-premi').innerHTML = hPremi || "<p style='text-align:center'>Nessun premio</p>";

            const campo = document.getElementById('pedine-campo'); campo.innerHTML = "";
            const convocati = clubData.ps.filter(p => p.convocato);
            const pos = schemi[clubData.mod || '4-4-2'];
            convocati.forEach((p, i) => {
                if(i < 11) {
                    const div = document.createElement('div'); div.className = 'pedina';
                    div.style.left = `calc(${pos[i].x}% - 27px)`; div.style.top = `calc(${pos[i].y}% - 27px)`;
                    div.innerHTML = `<div class="maglia">${p.m}</div><div class="nome-p">${p.n}</div>`;
                    campo.appendChild(div);
                }
            });

            document.getElementById('adm-list').innerHTML = clubData.ps.map(p => `
                <div class="scheda">
                    <b>${p.n}</b> <button onclick="const i=clubData.ps.findIndex(x=>x.id==${p.id}); clubData.ps[i].g++; sync()">+GOL</button>
                    <button onclick="const i=clubData.ps.findIndex(x=>x.id==${p.id}); clubData.ps[i].potm++; sync()">+POTM</button>
                    <button onclick="clubData.ps=clubData.ps.filter(x=>x.id!==${p.id}); sync()" style="color:red">X</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
